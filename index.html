<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карты музеев Москвы</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map {
            height: 500px;
        }
        .info {
            padding: 10px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="info" class="info"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var mymap = L.map('map').setView([55.7558, 37.6173], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
        }).addTo(mymap);

      fetch('https://serezaolejnikov8209-ship-it.github.io/museums.json')
    .then(response => {
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        return response.json();
    })
    .then(data => {
        console.log(data);
        // Здесь добавьте код для отрисовки кружков на карте на основе данных
    })
    .catch(error => {
        console.error('Ошибка при загрузке данных:', error);
    });
    </script>
</body>
</html>
