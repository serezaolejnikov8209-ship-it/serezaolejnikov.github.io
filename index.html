<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта музеев</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map {
            height: 600px; /* Высота карты */
            width: 100%;   /* Ширина карты */
        }
    </style>
</head>
<body>

<h1>Карта музеев</h1>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    // Инициализация карты
    const map = L.map('map').setView([55.7558, 37.6173], 10); // Центр карты на Москве

    // Добавление слоя карты
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Загрузка данных о музеях
    fetch('https://raw.githubusercontent.com/serezaolejnikov/museums.json')
    .then(response => {
        if (!response.ok) throw new Error('Ошибка сети: ' + response.statusText);
        return response.json();
    })
    .then(data => {
        data.forEach(museum => {
            const marker = L.marker(museum.location).addTo(map);
            marker.bind Popup(`<b>${museum.name}</b><br>Часы: ${museum.hours}<br>Цена: ${museum.price}<br><a href="${museum.website}" target="_blank">Сайт</a>`);
        });
    })
    .catch(error => console.error('Ошибка при загрузке данных:', error));
</script>

</body>
</html>
